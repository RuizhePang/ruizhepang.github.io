<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="none">
  <defs>
    <!-- Pure white base -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Very subtle shadowy ink for lines -->
    <style>
      .l1{stroke:#d9d9d9;stroke-width:1.2;opacity:.55;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .l2{stroke:#cdcdcd;stroke-width:1.8;opacity:.55;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .l3{stroke:#e1e1e1;stroke-width:1.0;opacity:.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>

    <!-- Gentle haze blob gradient -->
    <radialGradient id="haze" cx="35%" cy="30%" r="60%">
      <stop offset="0" stop-color="#f3f3f3" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haze2" cx="78%" cy="62%" r="55%">
      <stop offset="0" stop-color="#f0f0f0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- A repeating waveform ribbon pattern: sparse + airy -->
    <pattern id="ribbon" width="520" height="360" patternUnits="userSpaceOnUse">
      <!-- top ribbon -->
      <path class="l2" d="M-20 92
        C 40 92, 40 58, 100 58
        S 160 126, 220 126
        S 280 78, 340 78
        S 400 112, 460 112
        S 520 60, 580 60"/>
      <!-- middle ribbon (thin) -->
      <path class="l1" d="M-40 186
        C 30 186, 30 210, 100 210
        S 170 156, 240 156
        S 310 204, 380 204
        S 450 168, 520 168
        S 590 196, 660 196"/>
      <!-- bottom ribbon (very light) -->
      <path class="l3" d="M-10 286
        C 60 286, 60 270, 130 270
        S 200 302, 270 302
        S 340 282, 410 282
        S 480 298, 550 298"/>

      <!-- Minimal "ticks" reminiscent of sampling marks -->
      <g stroke="#e2e2e2" stroke-width="1" opacity="0.45">
        <path d="M70 40 v10"/>
        <path d="M220 40 v10"/>
        <path d="M370 40 v10"/>
        <path d="M120 320 v10"/>
        <path d="M300 320 v10"/>
        <path d="M480 320 v10"/>
      </g>
    </pattern>

    <!-- Fade to keep center clean for text -->
    <radialGradient id="centerFade" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>

  <!-- airy ribbons -->
  <rect width="1600" height="900" fill="url(#ribbon)" opacity="1"/>

  <!-- soft haze blobs -->
  <circle cx="420" cy="240" r="520" fill="url(#haze)"/>
  <circle cx="1220" cy="610" r="520" fill="url(#haze2)"/>

  <!-- keep the content area clean -->
  <rect width="1600" height="900" fill="url(#centerFade)"/>
</svg>
