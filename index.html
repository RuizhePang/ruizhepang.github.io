<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ruizhe Pang</title>
    <style>
      :root{color-scheme:light dark}
      body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:780px;margin:64px auto;padding:0 20px;line-height:1.6;
background-color:#ffffff;
}
      h1{margin:0 0 8px}
      .muted{opacity:.7}
      .card{background:rgba(255,255,255,.72);backdrop-filter:saturate(1.1) blur(6px);-webkit-backdrop-filter:saturate(1.1) blur(6px);
            border:1px solid rgba(0,0,0,.06);border-radius:16px;padding:28px 26px;box-shadow:0 12px 40px rgba(0,0,0,.06)}
      @media (prefers-color-scheme: dark){.card{background:rgba(20,20,20,.62);border-color:rgba(255,255,255,.08);box-shadow:0 12px 40px rgba(0,0,0,.35)}}
      a{color:inherit}
      code{padding:2px 6px;border-radius:6px;background:rgba(127,127,127,.15)}
    </style>
  </head>
  <body>
    <div class="card">
    <h1>Ruizhe Pang</h1>
    <p class="muted">Hello 👋 这是我的 GitHub Pages 主页。</p>
    <p>
      GitHub: <a href="https://github.com/RuizhePang">@RuizhePang</a>
    </p>
    <p class="muted"><code>Last updated:</code> <span id="ts"></span></p>
    <script>
      document.getElementById('ts').textContent = new Date().toISOString();
    </script>
      </div>
  </body>
</html>
