<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#4a4a4a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
  </defs>

  <!-- Transparent background by default -->

  <!-- Minimalist cat head line art (speech-theme friendly, neutral grayscale) -->
  <g stroke="url(#g)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer head -->
    <path d="M146 196
             C128 152 132 118 148 88
             C180 116 206 132 236 142
             C246 122 250 96 256 64
             C262 96 266 122 276 142
             C306 132 332 116 364 88
             C380 118 384 152 366 196
             C394 224 412 262 412 306
             C412 386 346 448 256 448
             C166 448 100 386 100 306
             C100 262 118 224 146 196Z"/>

    <!-- inner cheeks hint -->
    <path d="M168 318 C188 360 220 384 256 384 C292 384 324 360 344 318" opacity="0.35"/>

    <!-- eyes (simple arcs) -->
    <path d="M196 276 C212 262 232 262 248 276"/>
    <path d="M264 276 C280 262 300 262 316 276"/>

    <!-- nose -->
    <path d="M248 306 L256 316 L264 306"/>

    <!-- mouth -->
    <path d="M256 316 C246 330 232 336 220 336" opacity="0.85"/>
    <path d="M256 316 C266 330 280 336 292 336" opacity="0.85"/>

    <!-- whiskers -->
    <path d="M170 316 L118 308" opacity="0.6"/>
    <path d="M172 338 L114 346" opacity="0.6"/>
    <path d="M342 316 L394 308" opacity="0.6"/>
    <path d="M340 338 L398 346" opacity="0.6"/>
  </g>

  <!-- subtle accent: tiny waveform under chin -->
  <g transform="translate(160 398)" stroke="#6a6a6a" stroke-width="6" stroke-linecap="round" opacity="0.55" filter="url(#soft)">
    <path d="M0 24 L0 16"/>
    <path d="M24 24 L24 8"/>
    <path d="M48 24 L48 4"/>
    <path d="M72 24 L72 10"/>
    <path d="M96 24 L96 0"/>
    <path d="M120 24 L120 10"/>
    <path d="M144 24 L144 4"/>
    <path d="M168 24 L168 8"/>
    <path d="M192 24 L192 16"/>
  </g>
</svg>
