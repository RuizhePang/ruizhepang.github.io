<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="none">
  <defs>
    <!-- Soft grayscale palette -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7f7"/>
      <stop offset="1" stop-color="#eeeeee"/>
    </linearGradient>

    <!-- Subtle noise using turbulence (vector, lightweight) -->
    <filter id="noise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="7"/>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.55
        0 0 0 0 0.55
        0 0 0 0 0.55
        0 0 0 0 0.08"/>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>

    <!-- Repeating waveform tile -->
    <pattern id="waveTile" width="220" height="160" patternUnits="userSpaceOnUse">
      <!-- faint grid dots -->
      <g opacity="0.35" fill="#cfcfcf">
        <circle cx="20" cy="20" r="1"/>
        <circle cx="110" cy="20" r="1"/>
        <circle cx="200" cy="20" r="1"/>
        <circle cx="20" cy="80" r="1"/>
        <circle cx="110" cy="80" r="1"/>
        <circle cx="200" cy="80" r="1"/>
        <circle cx="20" cy="140" r="1"/>
        <circle cx="110" cy="140" r="1"/>
        <circle cx="200" cy="140" r="1"/>
      </g>

      <!-- waveform strokes -->
      <g fill="none" stroke="#bfbfbf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.65">
        <!-- top waveform -->
        <path d="M0 45
                 C 20 45, 20 25, 40 25
                 S 60 65, 80 65
                 S 100 35, 120 35
                 S 140 55, 160 55
                 S 180 15, 200 15
                 S 220 45, 240 45"/>
        <!-- middle waveform (phase shifted) -->
        <path d="M-10 85
                 C 10 85, 10 105, 30 105
                 S 50 65, 70 65
                 S 90 95, 110 95
                 S 130 75, 150 75
                 S 170 115, 190 115
                 S 210 85, 230 85" opacity="0.55"/>
        <!-- bottom waveform (smaller amplitude) -->
        <path d="M0 125
                 C 22 125, 22 115, 44 115
                 S 66 135, 88 135
                 S 110 120, 132 120
                 S 154 130, 176 130
                 S 198 110, 220 110" opacity="0.45"/>
      </g>

      <!-- minimal "spectral" bars hint -->
      <g opacity="0.22" fill="#bdbdbd">
        <rect x="18" y="98" width="6" height="18" rx="2"/>
        <rect x="34" y="92" width="6" height="24" rx="2"/>
        <rect x="50" y="100" width="6" height="16" rx="2"/>
        <rect x="66" y="88" width="6" height="28" rx="2"/>
        <rect x="82" y="96" width="6" height="20" rx="2"/>
      </g>
    </pattern>

    <!-- soft vignette -->
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.06"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#waveTile)" opacity="0.9"/>
  <rect width="1600" height="900" fill="url(#vignette)"/>
  <rect width="1600" height="900" filter="url(#noise)" opacity="0.7"/>
</svg>
